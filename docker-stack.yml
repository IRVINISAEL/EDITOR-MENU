version: "3.8"

services:
  mysql:
    image: mysql:8.0
    networks:
      - red-datos
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-menumaster}
      MYSQL_USER: ${DB_USER:-menumaster_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-menumaster_pass}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      placement:
        constraints:
          - node.role == manager

  backend:
    image: menumaster-backend:latest
    networks:
      - red-datos
      - red-app
    environment:
      DB_HOST: mysql
      DB_USER: ${DB_USER:-menumaster_user}
      DB_PASSWORD: ${DB_PASSWORD:-menumaster_pass}
      DB_NAME: ${DB_NAME:-menumaster}
      DB_PORT: 3306
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-menumaster_jwt_secret_2024}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    ports:
      - "4000:4000"
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
      rollback_config:
        parallelism: 1
        delay: 10s

  frontend:
    image: menumaster-frontend:latest
    networks:
      - red-app
    ports:
      - "3000:3000"
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
      rollback_config:
        parallelism: 1
        delay: 10s

networks:
  red-datos:
    driver: overlay
  red-app:
    driver: overlay

volumes:
  mysql_data: